version: "3.9"

services:
  # ── FastAPI Backend ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fitness_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - APP_NAME=FitnessTracker
      - ENVIRONMENT=production
      - DEBUG=false
      - DATABASE_URL=sqlite+aiosqlite:///./data/fitness_tracker.db
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production-32-chars-min}
      - AI_PROVIDER=${AI_PROVIDER:-openai}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - OLLAMA_BASE_URL=http://ollama:11434
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:8081,exp://localhost:8081
      - LOG_LEVEL=INFO
    volumes:
      - backend_data:/app/data
      - backend_logs:/app/logs
    depends_on:
      - ollama
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Ollama Local LLM (optional) ────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: fitness_ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    profiles:
      - local-ai    # only start with: docker compose --profile local-ai up

  # ── Nginx reverse proxy (optional production front) ─────────────────────────
  nginx:
    image: nginx:alpine
    container_name: fitness_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    profiles:
      - production

volumes:
  backend_data:
  backend_logs:
  ollama_data:

networks:
  default:
    name: fitness_network
